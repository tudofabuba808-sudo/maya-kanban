<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya Kanban</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #eee);
    min-height: 100vh;
    padding: 12px;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
    text-align: center;
    opacity: 0.9;
  }

  .board {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .column {
    flex: 0 0 260px;
    background: var(--tg-theme-secondary-bg-color, #16213e);
    border-radius: 14px;
    padding: 12px;
    min-height: 200px;
  }

  .column-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.6;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .count {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
  }

  .task {
    background: var(--tg-theme-bg-color, #0f3460);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: transform 0.15s, opacity 0.15s;
    position: relative;
  }

  .task:active { transform: scale(0.97); }

  .task.priority-high { border-left-color: #ff6b6b; }
  .task.priority-med  { border-left-color: #ffd93d; }
  .task.priority-low  { border-left-color: #6bcb77; }

  .task-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .task-desc {
    font-size: 12px;
    opacity: 0.6;
    line-height: 1.4;
  }

  .task-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }

  .task-tag {
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 2px 7px;
    opacity: 0.8;
  }

  .task-date {
    font-size: 10px;
    opacity: 0.4;
  }

  .task-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .btn-move {
    font-size: 11px;
    padding: 3px 8px;
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-move:hover { background: rgba(255,255,255,0.2); }
  .btn-delete { color: #ff6b6b; }

  .empty {
    text-align: center;
    opacity: 0.3;
    font-size: 13px;
    padding: 20px 0;
  }

  .loading {
    text-align: center;
    padding: 40px;
    opacity: 0.5;
    font-size: 14px;
  }

  .error-msg {
    text-align: center;
    color: #ff6b6b;
    padding: 20px;
    font-size: 13px;
  }

  .last-updated {
    text-align: center;
    font-size: 11px;
    opacity: 0.3;
    margin-top: 12px;
  }

  .refresh-btn {
    display: block;
    margin: 8px auto 0;
    font-size: 12px;
    padding: 5px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: transparent;
    color: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🌿 Maya Kanban</h1>
<div id="app"><div class="loading">Загрузка...</div></div>

<script>
const OWNER = 'tudofabuba808-sudo';
const REPO  = 'maya-kanban';
const FILE  = 'kanban.json';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

const COLS = {
  todo:       { label: '📋 К выполнению', icon: '📋' },
  inprogress: { label: '⚡ В работе',      icon: '⚡' },
  done:       { label: '✅ Готово',         icon: '✅' },
};

let data = { columns: ['todo','inprogress','done'], tasks: [] };
let sha = null;

async function load() {
  try {
    // GitHub Contents API — работает в Telegram webview
    const r = await fetch(API + '?t=' + Date.now(), {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const meta = await r.json();
    const decoded = atob(meta.content.replace(/\n/g,''));
    data = JSON.parse(decoded);
    render();
  } catch(e) {
    // Fallback: jsDelivr CDN
    try {
      const r2 = await fetch(`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@main/${FILE}?t=${Date.now()}`);
      if (!r2.ok) throw new Error('cdn ' + r2.status);
      data = await r2.json();
      render();
    } catch(e2) {
      document.getElementById('app').innerHTML = `<div class="error-msg">Ошибка загрузки 😢<br><small>${e.message} / ${e2.message}</small></div>`;
    }
  }
}

function render() {
  const app = document.getElementById('app');
  let html = '<div class="board">';

  for (const col of data.columns) {
    const cfg = COLS[col] || { label: col, icon: '📌' };
    const tasks = data.tasks.filter(t => t.column === col);
    html += `<div class="column">
      <div class="column-title">${cfg.icon} ${cfg.label.split(' ').slice(1).join(' ')} <span class="count">${tasks.length}</span></div>`;

    if (tasks.length === 0) {
      html += `<div class="empty">Пусто</div>`;
    }

    for (const t of tasks) {
      const pClass = t.priority === 'high' ? 'priority-high' : t.priority === 'low' ? 'priority-low' : 'priority-med';
      html += `<div class="task ${pClass}" id="task-${t.id}">
        <div class="task-title">${esc(t.title)}</div>
        ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
        <div class="task-meta">
          ${t.tag ? `<span class="task-tag">${esc(t.tag)}</span>` : '<span></span>'}
          <span class="task-date">${t.date || ''}</span>
        </div>
        <div class="task-actions">
          ${col !== 'todo'       ? `<button class="btn-move" onclick="move('${t.id}','todo')">← К выполн.</button>` : ''}
          ${col !== 'inprogress' ? `<button class="btn-move" onclick="move('${t.id}','inprogress')">⚡ В работу</button>` : ''}
          ${col !== 'done'       ? `<button class="btn-move" onclick="move('${t.id}','done')">✅ Готово</button>` : ''}
          <button class="btn-move btn-delete" onclick="del('${t.id}')">✕</button>
        </div>
      </div>`;
    }

    html += '</div>';
  }

  html += '</div>';
  html += `<div class="last-updated">Обновлено: ${new Date().toLocaleTimeString('ru')}</div>`;
  html += `<button class="refresh-btn" onclick="load()">🔄 Обновить</button>`;
  app.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function move(id, col) {
  const t = data.tasks.find(x => x.id === id);
  if (t) { t.column = col; render(); }
}

function del(id) {
  data.tasks = data.tasks.filter(x => x.id !== id);
  render();
}

// Инит Telegram WebApp
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

load();
</script>
</body>
</html>
